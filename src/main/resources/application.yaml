spring:
  server:
    port: 8080
  application:
    name: gateway-service
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              predicates:
                - Path=/auth/**
              uri: http://localhost:8081
  httpclient:
    connect-timeout: 5000   # мс
    response-timeout: 10s   # сек
  filters:
    - name: JwtHeaderFilter
      args:
        order: 1

        # - Retry=5 - Повторяет запросы в случае неудачи


  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-service:8081/.well-known/jwks.json